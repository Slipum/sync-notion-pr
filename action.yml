name: 'Notion PR Sync'
description: 'Sync GitHub Pull Requests with Notion tasks (bi-directional links, no duplicates)'
author: 'Slipum'

inputs:
  notion_token:
    description: 'Notion Internal Integration Token'
    required: true

  notion_version:
    description: 'Notion API version'
    required: false
    default: '2026-03-11'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'link'
  color: 'purple'
